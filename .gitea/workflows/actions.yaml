name: Gitea HomeAssistant Actions
run-name: ${{ gitea.actor }} is building the HomeAssistant project
on:
  push:

jobs:
  HomeAssistant:
    runs-on: yocto-builder
    env:
      GITHUB_STATUS_CONTEXT: gitea/homeassistant-build
      GITHUB_STATUS_REPOSITORY: meta-homeassistant/meta-homeassistant
      RUNNER_TOOL_CACHE: /toolcache # Runner Tool Cache
    container:
      volumes:
          - /cache/:/cache/
          - /dev/kvm:/dev/kvm/
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set GitHub status to pending
        shell: bash
        env:
          STATUS_TOKEN: ${{ secrets.STATUS_TOKEN }}
        run: |
          if [[ -z "${STATUS_TOKEN}" ]]; then
            echo "STATUS_TOKEN is not configured; skipping GitHub status update."
            exit 0
          fi

          payload_file="$(mktemp)"
          cat > "${payload_file}" <<EOF
          {
            "state": "pending",
            "context": "${GITHUB_STATUS_CONTEXT}",
            "description": "HomeAssistant build is running on Gitea"
          }
          EOF

          for attempt in $(seq 1 12); do
            if python3 - "${payload_file}" <<'PY'
          import json
          import os
          import pathlib
          import sys
          import urllib.error
          import urllib.request

          payload_path = pathlib.Path(sys.argv[1])
          request = urllib.request.Request(
              url=f"https://api.github.com/repos/{os.environ['GITHUB_STATUS_REPOSITORY']}/statuses/${{ gitea.sha }}",
              data=payload_path.read_bytes(),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['STATUS_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request) as response:
                  print(response.read().decode())
          except urllib.error.HTTPError as exc:
              print(exc.read().decode(), file=sys.stderr)
              raise
          PY
            then
              rm -f "${payload_file}"
              exit 0
            fi

            echo "GitHub commit status update failed on attempt ${attempt}; retrying."
            sleep 10
          done

          rm -f "${payload_file}"
          exit 1
      - name: Build
        shell: bash
        run: |
          echo "Cloning bitbake"
          git clone https://git.openembedded.org/bitbake sources/bitbake
          echo "Creating shared site.conf"
          mkdir -p bitbake-builds
          cat <<'EOF' > bitbake-builds/site.conf
          DL_DIR ?= "/cache/downloads/"
          SSTATE_DIR ?= "/cache/sstate-cache"
          BB_HASHSERVE_DB_DIR ?= "${SSTATE_DIR}"
          EOF
          echo "Initializing Yocto build directory"
          sources/bitbake/bin/bitbake-setup \
            init \
            --non-interactive \
            configurations/homeassistant.conf.json homeassistant-x86 \
            --source-overrides configurations/dev-forks.json
          echo "Sourcing environment"
          source bitbake-builds/homeassistant-x86/build/init-build-env
          echo "Starting build"
          bitbake core-image-homeassistant-full |& tee "${{ gitea.workspace }}/build.log"
      - name: Set GitHub status to success
        if: success()
        shell: bash
        env:
          STATUS_TOKEN: ${{ secrets.STATUS_TOKEN }}
        run: |
          if [[ -z "${STATUS_TOKEN}" ]]; then
            echo "STATUS_TOKEN is not configured; skipping GitHub status update."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          payload = json.dumps(
              {
                  "state": "success",
                  "context": os.environ["GITHUB_STATUS_CONTEXT"],
                  "description": "HomeAssistant build passed on Gitea",
              }
          ).encode()

          request = urllib.request.Request(
              url=f"https://api.github.com/repos/{os.environ['GITHUB_STATUS_REPOSITORY']}/statuses/${{ gitea.sha }}",
              data=payload,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['STATUS_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request) as response:
                  print(response.read().decode())
          except urllib.error.HTTPError as exc:
              print(exc.read().decode(), file=sys.stderr)
              raise
          PY
      - name: Set GitHub status to failure
        if: failure()
        shell: bash
        env:
          STATUS_TOKEN: ${{ secrets.STATUS_TOKEN }}
        run: |
          if [[ -z "${STATUS_TOKEN}" ]]; then
            echo "STATUS_TOKEN is not configured; skipping GitHub status update."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          payload = json.dumps(
              {
                  "state": "failure",
                  "context": os.environ["GITHUB_STATUS_CONTEXT"],
                  "description": "HomeAssistant build failed on Gitea",
              }
          ).encode()

          request = urllib.request.Request(
              url=f"https://api.github.com/repos/{os.environ['GITHUB_STATUS_REPOSITORY']}/statuses/${{ gitea.sha }}",
              data=payload,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['STATUS_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request) as response:
                  print(response.read().decode())
          except urllib.error.HTTPError as exc:
              print(exc.read().decode(), file=sys.stderr)
              raise
          PY
